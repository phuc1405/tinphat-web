<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>ERP LEVEL 3</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#f4f6f9;
    font-size:14px;
}

/* SIDEBAR */
.sidebar {
    width:220px;
    height:100vh;
    position:fixed;
    background:#111827;
    color:white;
    padding:15px;
}

.sidebar a {
    display:block;
    color:white;
    text-decoration:none;
    padding:10px;
    border-radius:8px;
    margin-bottom:5px;
}

.sidebar a:hover {
    background:#374151;
}

/* CONTENT */
.content {
    margin-left:240px;
    padding:20px;
}

/* ACTIVE */
.active {
    background:#2563eb !important;
}
</style>
</head>

<body>

<div class="sidebar">
    <h5>📦 ERP LEVEL 3</h5>
    <hr>

    <a href="/dashboard">Dashboard</a>
    <a href="/products">Products</a>
    <a href="/imports">Imports</a>
    <a href="/exports">Exports</a>
    <a href="/logout" style="color:#ff6b6b;">Logout</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
