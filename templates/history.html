<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>📜 Lịch sử giao dịch</h2>

<table class="table table-bordered">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Sản phẩm</th>
<th>Loại</th>
<th>SL</th>
<th>Đơn giá</th>
<th>Tổng</th>
<th>Thời gian (VN)</th>
</tr>
</thead>

<tbody>

{% for log in logs %}

<tr>
<td>{{ log[0] }}</td>
<td>{{ log[1] }}</td>
<td>{{ log[2] }}</td>
<td>{{ log[3] }}</td>
<td>{{ log[4] }}</td>
<td>{{ log[5] }}</td>
<td>{{ log[6] }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
